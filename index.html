<html lang="en">
<head>

  <title>BHS Kinetics – Timesheet Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- ══════════════════════════════════════════
     LOGIN
══════════════════════════════════════════ -->
<div id="login-page" style="display:flex">

  <!-- Left branding -->
  <div class="login-left">
    <div class="login-branding">
      <div class="login-logo-wrap">
        <img id="logo-login" alt="BHS Kinetics">
      </div>
      <h1 class="login-headline">Timesheet<br><span>Management</span></h1>
    </div>
  </div>

  <!-- Right card -->
  <div class="login-right">
    <div class="login-card">
      <div class="login-card-eyebrow">BHS Kinetics Portal</div>
      <h2>Welcome back</h2>
      <p class="login-card-sub">Sign in to your account to continue</p>
      <form id="lform">
        <div class="lf-group">
          <label>Username</label>
          <input type="text" id="lu" placeholder="Enter username" autocomplete="username">
        </div>
        <div class="lf-group">
          <label>Password</label>
          <input type="password" id="lp" placeholder="Enter password" autocomplete="current-password">
        </div>
        <button type="submit" class="login-submit">Sign In →</button>
        <div id="lerr" class="login-error" style="display:none">Invalid username or password.</div>
      </form>
      <div class="demo-section">
        <div class="demo-label">Demo Accounts</div>
        <button class="demo-btn" onclick="fillDemo('admin','admin123')">
          <span>👑 Administrator — Ahmad Ridhwan</span>
          <span class="demo-btn-right">admin / admin123</span>
        </button>
        <button class="demo-btn" onclick="fillDemo('manager1','manager123')">
          <span>👔 Manager — Sarah Lim</span>
          <span class="demo-btn-right">manager1 / manager123</span>
        </button>
        <button class="demo-btn" onclick="fillDemo('tech1','tech123')">
          <span>🔧 Tech — Ravi Kumar</span>
          <span class="demo-btn-right">tech1 / tech123</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     APP
══════════════════════════════════════════ -->
<div id="app">
  <nav class="topnav">
    <div class="nav-logo">
      <img id="logo-nav" alt="BHS Kinetics">
      <div class="nav-logo-sep"></div>
      <span class="nav-logo-label">Timesheet System</span>
    </div>
    <div class="nav-tabs" id="nav-tabs"></div>
    <div class="nav-right">
      <div class="nav-user-chip">
        <div class="nav-avatar" id="nav-init">–</div>
        <div class="nav-user-info">
          <div class="nav-username" id="nav-name">–</div>
          <div class="nav-role-tag" id="nav-role">–</div>
        </div>
      </div>
      <button class="signout-btn" onclick="logout()">Sign Out</button>
    </div>
  </nav>
  <div class="page-wrap" id="content"></div>
</div>
